<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <meta name="theme-color" content="#8d448d">
        <title>Practice Quizzes - StudyNest</title>
        <link rel="stylesheet" href="quiz.css" />
        <link rel="manifest" href="/manifest.json">
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Practice<br>Quizzes</h1>
                <div class="help-icon">?</div>
            </div>
            
            <div class="subject-grid">
                <div class="subject-card blue">MATH</div>
                <div class="subject-card purple">SCIENCE</div>
                <div class="subject-card yellow">ENGLISH</div>
                <div class="subject-card orange">HISTORY</div>
            </div>
            
            <div class="quiz-list" id="quizList">
                <div class="quiz-card purple">BIOLOGY: Chapter 4 (No. 7)</div>
                <div class="quiz-card blue">Chemistry: Chapter 5 (No. 13)</div>
            </div>
            
            <button class="btn-create" onclick="createQuiz()">CREATE QUIZ</button>
            
           <div class="nav-bar">
                <div class="nav-icon" onclick="location.href='home.html'"><i class="fa fa-home" style="color: #ff9800 "></i></div>
                <div class="nav-icon" onclick="location.href='notes.html'"><i class="fa fa-book" style="color: #9c27b0 "></i></div>
                <div class="nav-icon active" onclick="location.href='quiz.html'"><i class="fa fa-clock-o" style="color: #ffc107 "></i></div>
                <div class="nav-icon" onclick="location.href='profile.html'"><i class="fa fa-user" style="color: #03a9f4 "></i></div>
            </div>
        
        </div>
       <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW registration failed:", err));
}

function createQuiz() {
    const subject = prompt("Enter subject (e.g., MATH, SCIENCE):");
    const topic = prompt("Enter topic (e.g., Chapter 1):");
    if(subject && topic) {
        const quizList = document.getElementById('quizList');
        const colors = ['blue', 'purple', 'yellow', 'orange'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const quizCount = quizList.children.length + 1;
        const newQuiz = document.createElement('div');
        newQuiz.className = `quiz-card ${color}`;
        newQuiz.textContent = `${subject.toUpperCase()}: ${topic} (No. ${quizCount})`;
        quizList.appendChild(newQuiz);
        
        const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
        quizzes.push({subject, topic, color, number: quizCount});
        localStorage.setItem('quizzes', JSON.stringify(quizzes));
    }
}

window.onload = function() {
    const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
    const quizList = document.getElementById('quizList');
    quizzes.forEach(quiz => {
        const newQuiz = document.createElement('div');
        newQuiz.className = `quiz-card ${quiz.color}`;
        newQuiz.textContent = `${quiz.subject.toUpperCase()}: ${quiz.topic} (No. ${quiz.number})`;
        quizList.appendChild(newQuiz);
    });
};
</script>
    </body>
</html>
