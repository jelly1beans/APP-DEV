<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <title>Profile - StudyNest</title>
        <link rel="stylesheet" href="profile.css" />
        <link rel="manifest" href="/manifest.json">
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Profile</h1>
                <div class="help-icon">?</div>
            </div>
            
            <div class="profile-avatar">
                <div class="avatar-circle"><i class="fa fa-user"></i></div>
                <h2 id="profileName">Guest</h2>
            </div>
            
            <div class="profile-stats">
                <div class="stat-item blue">
                    <div class="stat-value">3</div>
                    <div class="stat-label">Notes</div>
                </div>
                <div class="stat-item purple">
                    <div class="stat-value">2</div>
                    <div class="stat-label">Quizzes</div>
                </div>
                <div class="stat-item orange">
                    <div class="stat-value">55%</div>
                    <div class="stat-label">Progress</div>
                </div>
            </div>
            
            <div class="profile-options">
                <div class="option-card yellow">EDIT PROFILE</div>
                <div class="option-card purple">SETTINGS</div>
                <div class="option-card blue">ACHIEVEMENTS</div>
                <div class="option-card orange" onclick="logout()">LOGOUT</div>
            </div>
            
            <div class="nav-bar">
                <div class="nav-icon" onclick="location.href='home.html'"><i class="fa fa-home" style="color: #ff9800"></i></div>
                <div class="nav-icon" onclick="location.href='notes.html'"><i class="fa fa-book" style="color: #9c27b0"></i></div>
                <div class="nav-icon" onclick="location.href='quiz.html'"><i class="fa fa-clock-o" style="color: #ffc107"></i></div>
                <div class="nav-icon active" onclick="location.href='profile.html'"><i class="fa fa-user" style="color: #03a9f4"></i></div>
            </div>
        </div>
        <script>
            const userName = localStorage.getItem('userName') || 'Guest';
            document.getElementById('profileName').textContent = userName;
            
            function logout() {
                localStorage.removeItem('userName');
                location.href = 'login.html';
            }

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW registration failed:", err));
}
</script>
        </script>
    </body>
</html>
